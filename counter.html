<title>Nota Servis</title>

<style>
body {
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
}

/* WRAPPER BIAR CENTER + PADDING */
.wrapper {
  width: 53mm;
  padding: 0 1mm;
  font-family: monospace;
  font-size: 11px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

td {
  padding: 2px 0;
}

.center { text-align: center; }
.right { text-align: right; }
.bold { font-weight: bold; }
.small { font-size: 10px; }
.label-small { font-size: 9px; font-weight: bold; }

.line {
  border-top: 1px dashed #000;
  margin: 4px 0;
}

img.header {
  width: 100%;
  max-height: 60px;
  object-fit: contain;
}

/* LABEL */
.label-box {
  margin-top: 10px;
}

.cut {
  text-align: center;
  font-size: 9px;
  margin: 5px 0;
}

/* PRINT */
@page {
  size: 55mm auto;
  margin: 0;
}

@media print {
  body {
    display: flex;
    justify-content: center;
  }

  .wrapper {
    width: 54mm;
    padding: 1mm;
  }

  * {
    page-break-inside: avoid;
  }
}
</style>

<div class="line"></div>

<!-- DATA -->
<table>
<tr><td>No</td><td class="right" id="no"></td></tr>
<tr><td>Tgl</td><td class="right" id="tgl"></td></tr>
<tr><td>Status</td><td class="right" id="status"></td></tr>
</table>

<div class="line"></div>
<table>
<tr><td>Nama</td><td>: <span id="nama"></span></td></tr>
<tr><td>Kontak</td><td>: <span id="kontak"></span></td></tr>

</table>
<div class="line"></div>
<table>
<tr><td>Unit</td><td>: <span id="unit"></span></td></tr>
<tr><td>IMEI</td><td>: <span id="imei"></span></td></tr>
</table>
<div class="line"></div>

<table>
<tr><td class="label-small">Keluhan</td></tr>
<tr><td id="keluhan"></td></tr>
</table>
<div class="line"></div>

<table>
<tr><td class="label-small">Catatan</td></tr>
<tr><td id="catatan"></td></tr>
</table>

<div class="line"></div>

<table>
<tr>
<td class="bold">Total</td>
<td class="right bold" id="total"></td>
</tr>
</table>

<!-- GARANSI -->
<div id="garansiBox" style="display:none;">
  <div class="line"></div>
  <div class="center small" id="garansiText"></div>
</div>

<div class="line"></div>

<!-- UCAPAN DINAMIS -->
<div class="center small" id="ucapan"></div>

<!-- LABEL -->
<div class="label-box" id="labelBox">

  <div class="cut">------ POTONG DI SINI ------</div>

  <div class="center">
    <canvas id="qrCanvas"></canvas>
  </div>

  <div class="center bold" id="noLabel"></div>
  <div class="center small" id="namaLabel"></div>
  <div class="center small" id="unitLabel"></div>
  <div class="center small" id="patternText"></div>

  <div class="center">
    <canvas id="patternCanvas" width="80" height="80"></canvas>
  </div>

</div>

</div>

<script>
// ===== PARAM =====
function getParam(n){
  return new URL(window.location.href).searchParams.get(n) || '';
}

const no = getParam("no");
const nama = getParam("nama");
const unit = getParam("unit");
const keluhan = getParam("keluhan");
const catatan = getParam("catatan");
const pattern = getParam("pattern");
const total = getParam("total");
const status = getParam("status").toLowerCase();
const garansi = getParam("garansi");
const ucapan = getParam("ucapan");
const tgl = getParam("tgl");
const imei = getParam("imei");
const kontak = getParam("kontak");

// ===== ISI DATA =====
document.getElementById("no").innerText = no;
document.getElementById("tgl").innerText = tgl;
document.getElementById("status").innerText = status;
document.getElementById("kontak").innerText = kontak;
document.getElementById("nama").innerText = nama;
document.getElementById("unit").innerText = unit;
document.getElementById("keluhan").innerText = keluhan;
document.getElementById("catatan").innerText = catatan;
document.getElementById("total").innerText = "Rp " + total;
document.getElementById("imei").innerText = imei;
document.getElementById("ucapan").innerHTML = ucapan.replace(/\n/g,"<br>");

// label
document.getElementById("noLabel").innerText = no;
document.getElementById("namaLabel").innerText = nama;
document.getElementById("unitLabel").innerText = unit;
document.getElementById("patternText").innerText = pattern ? "Pola: " + pattern : "";

// ===== STATUS =====
if (["selesai","diambil","done"].includes(status)) {
  document.getElementById("labelBox").style.display = "none";

  if (garansi) {
    document.getElementById("garansiBox").style.display = "block";
    document.getElementById("garansiText").innerHTML = garansi.replace(/\n/g,"<br>");
  }
}

// ===== QR =====
(function(){
  const c = document.getElementById("qrCanvas");
  const ctx = c.getContext("2d");
  const img = new Image();
  img.src = "https://api.qrserver.com/v1/create-qr-code/?size=60x60&data=" + encodeURIComponent(no);

  img.onload = function(){
    c.width = 80; c.height = 80;
    ctx.drawImage(img,0,0);
    const im = new Image();
    im.src = c.toDataURL();
    im.style.width = "65px";
    c.replaceWith(im);
  };
})();

// ===== PATTERN =====
(function(){
  if (!pattern) return;

  const c = document.getElementById("patternCanvas");
  const ctx = c.getContext("2d");

  const pos={
    1:[15,15],2:[40,15],3:[65,15],
    4:[15,40],5:[40,40],6:[65,40],
    7:[15,65],8:[40,65],9:[65,65],
  };

  const arr = pattern.split("-");
  ctx.lineWidth=2;

  ctx.beginPath();
  arr.forEach((n,i)=>{
    const [x,y]=pos[n];
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  });
  ctx.stroke();

  Object.values(pos).forEach(([x,y])=>{
    ctx.beginPath();
    ctx.arc(x,y,3,0,2*Math.PI);
    ctx.fill();
  });

  setTimeout(()=>{
    const im=new Image();
    im.src=c.toDataURL();
    im.style.width="65px";
    c.replaceWith(im);
  },150);
})();
</script>
